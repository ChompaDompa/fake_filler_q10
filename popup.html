<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      font-family: sans-serif;
      padding: 10px;
    }

    button {
      display: block;
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    button:last-of-type {
      margin-bottom: 0;
    }

    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #333;
      min-height: 16px;
      word-break: break-word;
    }
  </style>
</head>

<body>
  <button id="btn-fill">Rellenar formulario</button>
  <button id="btn-jack">Generar código Jack</button>
  <button id="btn-qa">Calculadora QA</button>
  <p id="status"></p>
  <script src="script/popup.js"></script>
</body>

</html>
